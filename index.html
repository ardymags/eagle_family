<style>

.modal-overlay{

@keyframes spin {
 0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbzUdw6sOc74FdtSFxKOUA1Uu236TXdc_E_eelUaVIct6LErZAkGiY_0wUSchWyCkjYM/exec";
const MASTER = {
  jenisKelamin: ["Laki-laki", "Perempuan"],
  
  agama: ["Islam", "Kristen", "Katholik", "Hindu", "Buddha"],
  
  statusKeluarga: ["Kepala Keluarga", "Istri", "Anak", "Famili Lain"],
  
  pekerjaan: [
    "Belum/Tidak Bekerja", "Ibu Rumah Tangga", "Pelajar/Mahasiswa", "Pensiunan",
    "Karyawan Swasta", "Pegawai Negeri Sipil", "Pegawai Honorer", "Wiraswasta",
    "Pedagang", "Petani/Pekebun", "Nelayan", "Buruh Harian Lepas", "Sopir",
    "Guru", "Dokter", "Bidan", "Perawat", "TNI", "Polri", "Lainnya"
  ],
  statusHuni: ["huni", "belum huni"]
};

let rawData = [];
let iuranData = [];
const spinner = document.getElementById('spinner');
const btnSave = document.querySelector('.btn.save');
function buatOption(arr, selectedValue = "") {
  return arr.map(val => 
    `<option value="${val}" ${val === selectedValue ? "selected" : ""}>${val}</option>`
  ).join("");
}

function formatDateForInput(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function formatRibu(num) {
  if (!num) return '';
  num = Number(num);
  if (num >= 1000) {
    return (num / 1000).toFixed(0) + 'K';
  }
  return num.toString();
}

function showSpinner() {
  spinner.style.display = 'flex';
  if(btnSave) btnSave.disabled = true;
}

function hideSpinner() {
  spinner.style.display = 'none';
  if(btnSave) btnSave.disabled = false;
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function loadData(){
fetch(apiURL)
.then(res => res.json())
.then(data => {
  rawData = data.warga || [];
  iuranData = data.iuran || [];
  renderTableWarga();
  renderTableIuran();
})
.catch(err => {
  console.log(err);
  alert("Gagal load data");
})
.finally(() => {
    hideSpinner();
});
}

function renderTableWarga(){
  let grouped = groupByKK(rawData);
  let html = "";
  Object.keys(grouped).forEach(kk => {
    let anggota = grouped[kk];
    let kepala = anggota.find(a => String(a.status_keluarga || "").toLowerCase().includes("kepala")) || anggota[0];
    let jmlAnggota = anggota.length;

    html += `
    <tr class="kk-row" data-kk="${kk}">
      <td><button class="toggle-btn" onclick="toggleDetail('${kk}')">▶</button>${kk}</td>
      <td>${kepala.nik || ''}</td><td>${kepala.nama || ''}</td><td>${kepala.jenis_kelamin || ''}</td>
      <td>${formatDateForInput(kepala.tanggal_lahir) || ''}</td><td>${kepala.agama || ''}</td>
      <td>Kepala Keluarga</td><td>${kepala.pekerjaan || ''}</td><td>${kepala.blok || ''}</td>
      <td>${kepala.no_rumah || ''}</td><td>${kepala.status_huni || ''}</td><td>${kepala.alamat || ''}</td>
      <td>${jmlAnggota} orang</td>
    </tr>
    `;

    anggota.forEach((r, i) => {
      html += `
      <tr class="detail-row detail-${kk}" data-kk="${kk}" 
	data-nik="${r.nik || ''}"
	data-id="${r.id || ''}"
	style="display:none; background:#f9fafb">
        <td style="padding-left:30px;">▶</td>
        <td><input data-field="nik" value="${r.nik || ''}" disabled></td>
        <td><input data-field="nama" value="${r.nama || ''}" disabled></td>

        <td><select data-field="jenis_kelamin" disabled>${buatOption(MASTER.jenisKelamin, r.jenis_kelamin)}</select></td>
        <td><input type="date" data-field="tanggal_lahir" value="${formatDateForInput(r.tanggal_lahir)}" disabled></td>

        <td><select data-field="agama" disabled>${buatOption(MASTER.agama, r.agama)}</select></td>
        <td><select data-field="status_keluarga" disabled>${buatOption(MASTER.statusKeluarga, r.status_keluarga)}</select></td>
        <td><select data-field="pekerjaan" disabled>${buatOption(MASTER.pekerjaan, r.pekerjaan)}</select></td>

        <td><input data-field="blok" value="${r.blok || ''}" disabled></td>
        <td><input data-field="no_rumah" value="${r.no_rumah || ''}" disabled></td>

        <td><select data-field="status_huni" disabled>${buatOption(MASTER.statusHuni, r.status_huni)}</select></td>
        <td><input data-field="alamat" value="${r.alamat || ''}" disabled></td>

        <td>
          <button class="btn edit" onclick="toggleEditRow(this)">✏️</button>
          <button class="btn delete" onclick="hapusRow(this)">🗑️</button>
        </td>
      </tr>
      `;
    });
  });
  document.getElementById("bodyWarga").innerHTML = html;
}

function hapusRow(btn){
if(confirm("Hapus data ini?")){
btn.parentElement.parentElement.remove();
}
}
function toggleEditRow(btn){
  let row = btn.closest('tr');
  let inputs = row.querySelectorAll('input, select');
  let isEditing = btn.textContent.includes('Edit');

  if(isEditing){
    // Masuk mode edit
    inputs.forEach(el => el.disabled = false);
    btn.textContent = '💾 Simpan';
    btn.className = 'btn save';
    btn.setAttribute('onclick', 'saveRow(this)');
  } else {
    // Keluar mode edit tanpa simpan
    inputs.forEach(el => el.disabled = true);
    btn.textContent = '✏️ Edit';
    btn.className = 'btn edit';
    btn.setAttribute('onclick', 'toggleEditRow(this)');
  }
}

function saveRow(btn){
  let row = btn.closest('tr');
  let obj = {
    no_kk: row.dataset.kk,
    id: row.dataset.id, // TAMBAH INI
    nik: row.dataset.nik // TAMBAH INI juga biar aman
  };

  row.querySelectorAll('input[data-field], select[data-field]').forEach(el => {
    obj[el.dataset.field] = el.value;
  });

  if(!obj.nik){
    alert("NIK wajib diisi!");
    return;
  }

  showSpinner();
  fetch(apiURL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action:"updateRow", data: obj})
  })
.then(res=>res.json())
.then(res=>{
    if(res.status === "ok"){
      alert("Berhasil diupdate");
      row.querySelectorAll('input, select').forEach(el => el.disabled = true);
      btn.textContent = '✏️';
      btn.className = 'btn edit';
      btn.setAttribute('onclick', 'toggleEditRow(this)');
      loadData();
    } else {
      alert("Gagal: " + res.message);
    }
  })
.catch(err=> alert("Error: " + err.message))
.finally(() => hideSpinner());
}

function getPeriode24Bulan(){
let tahun = new Date().getFullYear();
let list = [];
["Jul","Agu","Sep","Okt","Nov","Des"].forEach(b=>{list.push({bulan:b,tahun:tahun-1});});
["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"].forEach(b=>{list.push({bulan:b,tahun:tahun});});
["Jan","Feb","Mar","Apr","Mei","Jun"].forEach(b=>{list.push({bulan:b,tahun:tahun+1});});
return list;
}

function groupByKK(data){
let g = {};
data.forEach(r=>{

let sortState = { key: '', asc: true };

function sortTableIuran(key){
  // Toggle arah kalau klik kolom yang sama
  if(sortState.key === key){
    sortState.asc =!sortState.asc;
  }else{
    sortState.key = key;
    sortState.asc = true;
  }

  let grouped = groupByKK(rawData);
  let arr = Object.keys(grouped).map(kk => {
    let anggota = grouped[kk];
    let first = anggota[0];
    let kepala = anggota.find(a=>String(a.status_keluarga || "").toLowerCase().includes("kepala"));
    return {
      kk: kk,
      blok: first.blok || '',
      no_rumah: parseInt(first.no_rumah) || 0,
      nama: kepala? kepala.nama : first.nama,
      status_huni: first.status_huni || ''
    };
  });

  arr.sort((a,b) => {
    // Multi-level sort: Blok dulu, baru No Rumah
    let blokA = String(a.blok).toLowerCase();
    let blokB = String(b.blok).toLowerCase();

    if(blokA < blokB) return sortState.asc? -1 : 1;
    if(blokA > blokB) return sortState.asc? 1 : -1;

    // Kalau blok sama, urutin no_rumah
    if(a.no_rumah < b.no_rumah) return -1;
    if(a.no_rumah > b.no_rumah) return 1;

    // Kalau klik kolom lain, timpa sort sekundernya
    if(key!== 'blok' && key!== 'no_rumah'){
      let valA = String(a[key]).toLowerCase();
      let valB = String(b[key]).toLowerCase();
      if(valA < valB) return sortState.asc? -1 : 1;
      if(valA > valB) return sortState.asc? 1 : -1;
    }

    return 0;
  });

  renderTableIuranSorted(arr);
}

function enableResize(tableId){
  const table = document.getElementById(tableId);
  const cols = table.querySelectorAll("th");
  cols.forEach(col => {
    const resizer = document.createElement("div");
    resizer.classList.add("resizer");
    col.appendChild(resizer);
    let startX, startWidth;
    resizer.addEventListener("mousedown", e => {
      startX = e.pageX;
      startWidth = col.offsetWidth;
      document.addEventListener("mousemove", resizeColumn);
      document.addEventListener("mouseup", stopResize);
    });
    function resizeColumn(e){
      let newWidth = startWidth + (e.pageX - startX);
      col.style.width = newWidth + "px";
    }
    function stopResize(){
      document.removeEventListener("mousemove", resizeColumn);
      document.removeEventListener("mouseup", stopResize);
    }
  });
}

function exportExcel(){
  if(typeof XLSX === 'undefined'){
    alert('SheetJS belum load. Refresh halaman dulu.');
    return;
  }

  const table = document.getElementById("tableIuran");
  const wb = XLSX.utils.book_new();
  const ws = {};

  const rows = table.rows.length;
  const cols = table.rows[0].cells.length;
  const range = {s:{r:0,c:0}, e:{r:rows-1, c:cols-1}};

  for(let R = 0; R < rows; R++){
    for(let C = 0; C < cols; C++){
      const cellEl = table.rows[R].cells[C];
      const cellAddress = XLSX.utils.encode_cell({r: R, c: C});
      const cellText = cellEl.innerText.trim();

      ws[cellAddress] = {v: cellText, t: "s"};

      const span = cellEl.querySelector('span');
      let bgColor = null;

      if(span){
        if(span.classList.contains('kas')) bgColor = 'DBEAFE';
        else if(span.classList.contains('ipl')) bgColor = 'DFF3E6';
        else if(span.classList.contains('ipl-nonis')) bgColor = 'FDDDFF';
        else if(span.classList.contains('ipl-pengurus')) bgColor = 'F5D1D1';
        else if(span.classList.contains('pos') || span.classList.contains('fasum')) bgColor = 'F9FDB2';
      }

      if(R === 0){
        ws[cellAddress].s = {
          fill: { fgColor: { rgb: 'F1F3F5' }, patternType: "solid" },
          font: { bold: true, color: { rgb: '555' } },
          alignment: { horizontal: "center", vertical: "center" }
        };
      } else if(bgColor){
        ws[cellAddress].s = {
          fill: { fgColor: { rgb: bgColor }, patternType: "solid" },
          font: { color: { rgb: '1D4ED8' } },
          alignment: { vertical: "center" },
          border: {
            top: {style: "thin", color: {rgb: "E5E7EB"}},
            bottom: {style: "thin", color: {rgb: "E5E7EB"}},
            left: {style: "thin", color: {rgb: "E5E7EB"}},
            right: {style: "thin", color: {rgb: "E5E7EB"}}
          }
        };
      }
    }
  }

  ws['!ref'] = XLSX.utils.encode_range(range);
  ws['!freeze'] = {ySplit: 1};

  // Auto width
  const colWidths = [];
  for(let C = 0; C < cols; C++){
    let maxLen = 8;
    for(let R = 0; R < rows; R++){
      const addr = XLSX.utils.encode_cell({r: R, c: C});
      if(ws[addr] && ws[addr].v){
        maxLen = Math.max(maxLen, String(ws[addr].v).length);
      }
    }
    colWidths.push({wch: Math.min(maxLen + 2, 30)});
  }
  ws['!cols'] = colWidths;

  XLSX.utils.book_append_sheet(wb, ws, "Rekap Iuran");
  XLSX.writeFile(wb, "Rekap_Iuran.xlsx");
}
function cleanCellText(cell){
  let txt = cell.textContent || '';

  return txt
    .replace(/☑/g, '✓')
    .replace(/⬜/g, '')
    .replace(/&/g, '')
    .replace(/\+/g, '')
    .replace(/\n/g, ' ')
    .replace(/\r/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

async function exportToPDF(){
  showSpinner();
  try{
    const element = document.getElementById('printArea');
    const header = element.querySelector('.print-header');

    // 1. Paksa header muncul sebelum capture
    const oldDisplay = header.style.display;
    header.style.display = 'flex';

    // 2. Tunggu 50ms biar browser render dulu
    await new Promise(resolve => setTimeout(resolve, 50));

    const canvas = await html2canvas(element,{
      scale: 3,
      useCORS: true,
      backgroundColor: '#ffffff',
    });

    // 3. Balikin display header seperti semula
    header.style.display = oldDisplay;

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });

    const pdfWidth = pdf.internal.pageSize.getWidth();
    const margin = 10;
    const imgWidth = pdfWidth - (margin * 2);
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    pdf.addImage(imgData, 'PNG', margin, margin, imgWidth, imgHeight);
    pdf.save('Rekap_Iuran_GG_Elang_1.pdf');

  }catch(err){
    console.error(err);
    alert('Gagal export PDF: ' + err.message);
  }finally{
    hideSpinner();
  }
}

function loadBulanBayar(){
  let kk = document.getElementById('selectKK').value;

  let bulanList = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  let html = '<label>Pilih Bulan yang Dibayar:</label><div class="bulan-grid">';

  bulanList.forEach(bulan=>{
    // Cari status huni yang berlaku di bulan + tahun ini
    let anggotaKK = rawData.filter(r => String(r.no_kk).trim()===String(kk).trim());
    let statusHuni = 'belum huni'; // default
    if(anggotaKK.length > 0){
      // ambil status huni dari salah satu anggota, biasanya sama semua
      statusHuni = anggotaKK[0].status_huni || 'belum huni';
    }

    let jenisYangDicek = String(statusHuni).toLowerCase()==='huni'? 'IPL' : 'KAS';

    let bayar = iuranData.find(i=>
      String(i.no_kk).trim()===String(kk).trim() &&
      String(i.bulan).trim().toLowerCase()===bulan.toLowerCase() &&
      String(i.tahun).trim()===String(tahun).trim() &&
      String(i.jenis).toUpperCase()===jenisYangDicek
    );

    let sudahBayar =!!bayar;
    let checked = sudahBayar? 'checked' : '';
    let nominalVal = bayar? bayar.nominal : '';
    let labelText = sudahBayar? `Lunas - ${bulan} (${jenisYangDicek})` : `${bulan} (${jenisYangDicek})`;

    html += `
    <div class="bulan-item">
      <input type="checkbox" id="bulan_${bulan}" ${checked} ${sudahBayar? 'disabled' : ''}
         data-bulan="${bulan}" onchange="toggleNominal('${bulan}')">
      <label for="bulan_${bulan}">${labelText}</label>
      <input type="number" id="nominal_${bulan}" class="nominal-input"
             value="${nominalVal}" placeholder="Nominal"
             ${checked? '' : 'disabled'} ${sudahBayar? 'readonly' : ''}>
    </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;

// Cek iuran sekali bayar
let sudahBayarPos = iuranData.some(i =>

);
let sudahBayarFasum = iuranData.some(i =>

);

}

function toggleNominal(bulan){
  let cb = document.getElementById('bulan_' + bulan);
  let input = document.getElementById('nominal_' + bulan);
  input.disabled =!cb.checked;
  if(!cb.checked) input.value = '';
}

function simpanBayar(){
  let kk = document.getElementById('selectKK').value;
  let tahun = document.getElementById('selectTahun').value;
  let jenis = document.getElementById('selectJenis').value;
  let dataUpdate = [];
  let valid = true;

  document.querySelectorAll('#bulanContainer input[type=checkbox]').forEach(cb=>{
    if(cb.checked){
      let bulan = cb.dataset.bulan;
      let nominal = document.getElementById('nominal_' + bulan).value;
      if(!nominal){
        alert('Nominal bulan ' + bulan + ' belum diisi!');
        valid = false;
      }else{
        dataUpdate.push({no_kk: kk,bulan: bulan,tahun: tahun,jenis: jenis,nominal: nominal});
      }
    }
  });

  if(document.getElementById('cekPos').checked){
    dataUpdate.push({no_kk: kk,bulan: 'POS',tahun: '',jenis: 'POS',nominal: 100000});
  }

  if(document.getElementById('cekFasum').checked){
    dataUpdate.push({no_kk: kk,bulan: 'FASUM',tahun: '',jenis: 'FASUM',nominal: 100000});
  }

  if(!valid || dataUpdate.length===0){
    alert('Pilih minimal 1 iuran');
    return;
  }

  showSpinner();
  fetch(apiURL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action:"updateIuran",data:dataUpdate})
  })
.then(res=>res.json())
.then(res=>{
    alert('Berhasil disimpan');
    closeBayarModal();
    loadData();
  })
.catch(err=>{
    alert('Error: '+err.message);
  })
.finally(()=>{
    hideSpinner();
  });
}
